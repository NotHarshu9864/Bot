<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gully League</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#020617; color:white; }
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 20px;
}
</style>
</head>

<body class="flex flex-col justify-center items-center min-h-screen text-center">

<h1 class="text-5xl font-bold mb-6 bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">
🏏 Gully League
</h1>

<p class="text-gray-400 mb-8">Track stats like IPL apps</p>

<div class="flex gap-4">
<button onclick="location.href='players.html'" class="glass px-6 py-3 hover:scale-105 transition">Players</button>
<button onclick="location.href='compare.html'" class="glass px-6 py-3 hover:scale-105 transition">Compare</button>
</div>

</body>
</html>
