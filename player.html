<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Profile</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #020617;
  color: white;
  user-select: none;
}

/* Banner */
.banner {
  background: linear-gradient(135deg, #7f1d1d, #ef4444);
}

/* Glass Card */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.05);
}

/* Glow */
.glow {
  box-shadow: 0 0 25px rgba(239,68,68,0.4);
}

/* Stat Box */
.stat-box {
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}
</style>

</head>

<body class="pb-24">

<!-- HEADER -->
<div class="banner h-40 relative">

  <button onclick="history.back()"
    class="absolute top-4 left-4 bg-black/40 p-2 rounded-full">
    
    <!-- Back Icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" stroke="white" viewBox="0 0 24 24">
      <path stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>

  </button>

</div>

<!-- PROFILE -->
<div id="profile" class="px-4 -mt-16"></div>

<!-- BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 flex justify-around py-3 text-xs">

  <button onclick="location.href='index.html'" class="text-gray-400">Home</button>
  <button onclick="location.href='players.html'" class="text-gray-400">Players</button>
  <button onclick="location.href='compare.html'" class="text-gray-400">Compare</button>

</div>

<script>
const id = new URLSearchParams(location.search).get("id");

fetch('data/players.json')
.then(res => res.json())
.then(players => {

  const p = players.find(x => x.id === id);

  document.getElementById("profile").innerHTML = `
  
    <!-- IMAGE + NAME -->
    <div class="text-center">

      <img src="${p.image}"
        class="w-28 h-28 rounded-full mx-auto border-4 border-red-500 glow">

      <h1 class="text-xl font-semibold mt-3">${p.name}</h1>
      <p class="text-gray-400 text-sm">Jersey #${p.jersey}</p>

    </div>

    <!-- QUICK STATS -->
    <div class="grid grid-cols-3 gap-3 mt-6">

      <div class="stat-box">
        <p class="text-red-400 text-xs">Runs</p>
        <p class="font-bold">${p.runs}</p>
      </div>

      <div class="stat-box">
        <p class="text-red-400 text-xs">Matches</p>
        <p class="font-bold">${p.matches}</p>
      </div>

      <div class="stat-box">
        <p class="text-red-400 text-xs">Wickets</p>
        <p class="font-bold">${p.wickets}</p>
      </div>

    </div>

    <!-- FULL STATS -->
    <div class="card p-4 mt-6">

      <h2 class="text-sm text-gray-400 mb-3">Performance Stats</h2>

      <div class="grid grid-cols-2 gap-3 text-sm">

        <div class="stat-box">
          <p class="text-red-400">Highest Score</p>
          <p>${p.highest || 0}</p>
        </div>

        <div class="stat-box">
          <p class="text-red-400">50s</p>
          <p>${p.fifties || 0}</p>
        </div>

        <div class="stat-box">
          <p class="text-red-400">100s</p>
          <p>${p.hundreds || 0}</p>
        </div>

        <div class="stat-box">
          <p class="text-red-400">6s</p>
          <p>${p.sixes}</p>
        </div>

        <div class="stat-box">
          <p class="text-red-400">4s</p>
          <p>${p.fours}</p>
        </div>

        <div class="stat-box">
          <p class="text-red-400">Strike Rate</p>
          <p>${p.strike || 0}</p>
        </div>

      </div>

    </div>

  `;
});
</script>

</body>
</html>
